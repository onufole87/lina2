name: Bug
description: A defect in existing functionality
title: "[Bug] "
labels: ["type/bug", "needs/refinement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, deployment (local/staging/prod), git SHA if known

  - type: textarea
    id: severity
    attributes:
      label: Severity Assessment
      description: Impact on users, blocking nature, data integrity concerns
    validations:
      required: true
